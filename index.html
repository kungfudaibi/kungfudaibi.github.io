<body>

    <main>
        <h1>这是一个个人搭建的学习网站</h1>

    </main>
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
    <script>
        var app = new Vue({
            el: '#app',
            data: {
                name: 'Google Engineer',
                bio: 'Highly competent and experienced Google software engineer...',
                experience: [
                    {
                        role: 'Senior Software Engineer',
                        company: 'Google',
                        description: 'Developed and maintained key features for Google Search...'
                    },
                    // more experience...
                ],
                skills: ['JavaScript', 'Python', 'C++', 'Google Cloud Platform'],
            },
        });
    </script>
    <script>
        new p5(p => {
            let circles = [];
            p.setup = function () {
                p.createCanvas(p.windowWidth, p.windowHeight);
                for (let i = 0; i < 100; i++) {
                    circles[i] = {
                        x: p.random(p.width),
                        y: p.random(p.height),
                        r: p.random(20, 60),
                        col: p.color(p.random(100, 255), p.random(100, 255), p.random(100, 255), p.random(50, 100))
                    };
                }
            };
            p.draw = function () {
                p.background(220);
                for (let i = 0; i < circles.length; i++) {
                    let c = circles[i];
                    p.fill(c.col);
                    p.noStroke();
                    p.ellipse(c.x, c.y, c.r * 2);
                }
            };
            p.mouseClicked = function () {
                circles.push({
                    x: p.mouseX,
                    y: p.mouseY,
                    r: p.random(20, 60),
                    col: p.color(p.random(100, 255), p.random(100, 255), p.random(100, 255), p.random(50, 100))
                });
            };
        });
    </script>




</body>
